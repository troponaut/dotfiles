# Chevron Glance

"$schema" = 'https://starship.rs/config-schema.json'

#right_format = """$all"""

format = """
[оВґ](fg:sec)\
$sudo\
$os\
$jobs\
$username\
$hostname\
$localip\
$git_status\
$directory\
$git_commit$git_state$git_metrics\
$git_branch\
$memory_usage\
$status\
[оВі ](fg:prim)\
$cmd_duration\

$line_break$character
"""

add_newline = false

palette = "chevron_glance"


[fill]
symbol = " "

[palettes.chevron_glance]
prim = '#a7906f' #Primary/Directory Background
sec = '#3a3a3a' #Accents
primt = '#3a3a3a' #Primary text color (non-glyphic)
sudo = '#9c454e'
user = '#274693'
host = '#FCA17D'
ip = '#FCA17D'
duration = '#8a8a8a'
# Git Colors
tert = '#3a3a3a' #Tertiary color, mostly used for GitHub text.
conflicted = 'red'
ahead = 'cyan'
behind = 'orange'
diverged = 'blue'
uptodate = 'green'
untracked = 'purple'
stashed =  '#6b84eb' #light blue
modified = 'yellow'
staged = '#c5e187' #sage
renamed = '#ce63ff' #lilac
deleted = '#f54caf' #pink

[sudo]
format = '[пСД ]($style)'
style = 'fg:sudo bg:sec'
disabled = true

[os]
format = "[$symbol ]($style)"
style = "fg:prim bg:sec"
disabled = false

[os.symbols]
Alpine = "пМА"
Amazon = "пЙ∞"
Android = "оЬО"
Arch = "пМГ"
CentOS = "пМД"
Debian = "пМЖ"
DragonFly = "рЯРЙ" # "оЮЖ"
Emscripten = "рЯФЧ"
EndeavourOS = "пМҐ" # "пЮї"
Fedora = "пМК"
FreeBSD = "пММ"
Garuda = "пЕЉ"
Gentoo = "пМН"
HardenedBSD = "п¶Ч"
Illumos = "рЯР¶"
Linux = "пЕЉ"
Macos = "пМВ"
Manjaro = "пМТ"
Mariner = "пЕЉ"
MidnightBSD = "рЯМШ"
Mint = "пМО"
NetBSD = "пЕЉ"
NixOS = "пМУ"
OpenBSD = "пМ®" # "пЕЉ"
OpenCloudOS = "вШБпЄП"
openEuler = "пЕЉ"
openSUSE = "пМФ"
OracleLinux = "вКВвКГ"
Pop = "пМ™" # "пЕЉ"
Raspbian = "пМХ"
Redhat = "пМЦ"
RedHatEnterprise = "пМЦ"
Redox = "рЯІ™"
Solus = "пМ≠" # "пЕЉ "
SUSE = "пМФ"
Ubuntu = "пМЫ"
Unknown = "пДИ"
Windows = "оЬП"

[jobs]
format = '[оВґ]($style)[$symbol$number](fg:primt bg:prim)[оВ∞]($style)'
style = 'fg:prim bg:sec'
symbol = 'у∞ЗЇ '
symbol_threshold = 1
number_threshold = 2
disabled = false

[username]
format = '[оВ∞](fg:sec bg:user)[ $user ]($style)[оВ∞](fg:user bg:sec)'
style_user = 'fg:#FFFFFF bg:user'
style_root = 'fg:#FFFFFF bold bg:sudo'
show_always = true
disabled = false

[hostname]
format = '[ ](bg:sec)[@](fg:prim bold bg:sec)[ ](bg:sec)[оВ∞](fg:sec bg:host)[$ssh_symbol](fg:primt bold bg:host)[ $hostname ](fg:primt bold bg:host)[оВ∞](fg:host bg:sec)'
ssh_only = true
ssh_symbol = 'оЉЙ '
#trim_at = '.companyname.com'
disabled = false

[localip]
format = '[оВ∞](fg:sec bg:ip)[ $localipv4 ](fg:primt bold bg:ip)[оВ∞](fg:ip bg:sec)'
ssh_only = true
disabled = false

[git_status]
format = '([$all_status$ahead_behind]($style))[оВ∞](fg:sec bg:prim)'
style = 'fg:prim bg:tert'
conflicted = '[оВ∞](fg:sec bg:conflicted)[оВ∞](fg:conflicted bg:sec)'
ahead = '[оВ∞](fg:sec bg:ahead)[оВ∞](fg:ahead bg:sec)'
behind = '[оВ∞](fg:sec bg:behind)[оВ∞](fg:behind bg:behind)'
diverged = '[оВ∞](fg:sec bg:ahead)[оВ∞](fg:ahead bg:sec)'
up_to_date = '[оВ∞](fg:sec bg:uptodate)[оВ∞](fg:uptodate bg:sec)'
untracked = '[оВ∞](fg:sec bg:untracked)[оВ∞](fg:untracked bg:sec)'
stashed = '[оВ∞](fg:sec bg:stashed)[оВ∞](fg:stashed bg:sec)'
modified = '[оВ∞](fg:sec bg:modified)[оВ∞](fg:modified bg:sec)'
staged = '[оВ∞](fg:sec bg:staged)[оВ∞](fg:staged bg:sec)'
renamed = '[оВ∞](fg:sec bg:renamed)[оВ∞](fg:renamed bg:sec)'
deleted = '[оВ∞](fg:sec bg:deleted)[оВ∞](fg:deleted bg:sec)'
disabled = false

[directory]
format = '[оВ∞ ]($style)[$read_only](fg:primt bg:prim)[$repo_root]($repo_root_style)[$path](fg:primt bold bg:prim)'
style = 'fg:sec bg:prim'
home_symbol = 'оШЧ ~'
read_only = 'у∞ЙР '
#read_only_style = 'fg: bg:'
truncation_length = 2
truncation_symbol = 'вА¶/'
truncate_to_repo = true
repo_root_format = '[ пВЫ ](fg:sec bg:prim)[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[ ](bg:prim)'
repo_root_style	= 'fg:sec bold bg:prim'
use_os_path_sep = true
disabled = false

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "
".config" = ".пАУ "
".dotfiles" = ".пАУ "

[git_branch]
format = '[оВґ](fg:tert bg:prim)[$symbol $branch(:$remote_branch)]($style)[оВі](fg:tert bg:prim)'
style = 'fg:prim bold bg:tert'
symbol = 'оЬ•'

[memory_usage]
format = '[оВі](fg:prim bg:sec)[$symbol]($style)[оВі](fg:sec bg:prim)'
style = 'fg:sudo bg:sec'
symbol = ' оњЕ !'
threshold = 75
disabled = false

[status]
format = '[$symbol]($style)'
style = 'fg:sudo bg:prim'
symbol = ' пБ™ '
disabled = false

[cmd_duration]
format = '[у∞Њ® $duration ]($style)'
style = 'fg:duration'
min_time = 500
disabled = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ у±Ю©](bold fg:prim)'
error_symbol = '[ у±Ю©](bold fg:sudo)'
vimcmd_symbol = '[ пРі](bold fg:prim)'
vimcmd_replace_one_symbol = '[ пРі](bold fg:purple)'
vimcmd_replace_symbol = '[ пРі](bold fg:purple)'
vimcmd_visual_symbol = '[ пРі](bold fg:yellow)'

